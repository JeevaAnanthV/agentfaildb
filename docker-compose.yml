services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentfaildb
      POSTGRES_USER: agentfaildb
      POSTGRES_PASSWORD: agentfaildb
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentfaildb -d agentfaildb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/11434) 2>/dev/null && exit 0 || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  ollama-init:
    image: ollama/ollama:latest
    restart: on-failure
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      TASK_MODEL: ${TASK_MODEL:-llama3.1:8b}
    entrypoint: ["/bin/sh", "-c", "echo 'Pulling model: '\"$TASK_MODEL\" && ollama pull \"$TASK_MODEL\" && echo 'Model ready.'"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OLLAMA_BASE_URL: http://ollama:11434/v1
    ports:
      - "8001:8000"
    volumes:
      - pip_cache:/root/.cache/pip

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  pip_cache:
